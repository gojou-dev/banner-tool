<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>楽天 回遊バナー統合ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Arial,sans-serif;background:#f0f2f7;min-height:100vh}
.wrap{max-width:920px;margin:0 auto;padding:14px}
.header{background:#1F3864;color:#fff;border-radius:14px;padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.header h1{font-size:16px;font-weight:700}
.header p{font-size:11px;opacity:.7;margin-top:2px}

/* データ読込バー */
.databar{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.databar-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.databar-row:last-child{margin-bottom:0}
.db-label{font-size:12px;font-weight:700;min-width:120px}
.db-btn{font-size:12px;font-weight:600;cursor:pointer;border-radius:6px;padding:7px 14px;border:none}
.db-btn-main{background:#1F3864;color:#fff}
.db-btn-sub{background:#fff8e1;color:#e65100;border:1px solid #ffcc80}
.db-st{font-size:12px;color:#888}
.db-st.ok{color:#2e7d32;font-weight:600}

/* タブ */
.tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{flex:1;min-width:90px;font-size:12px;font-weight:600;text-align:center;padding:10px 6px;border-radius:10px 10px 0 0;background:#dfe4ee;color:#555;cursor:pointer;border:none}
.tab.active{background:#fff;color:#1F3864;box-shadow:0 -2px 6px rgba(0,0,0,.05)}
.panel{display:none}
.panel.active{display:block}

.empty{background:#fff;border-radius:12px;padding:40px 20px;text-align:center;color:#888;font-size:14px}

/* 共通：統計・ツールバー・カード */
.stats{display:grid;gap:8px;margin-bottom:12px}
.stat{background:#fff;border-radius:10px;padding:11px 6px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-label{font-size:10px;color:#888;margin-bottom:3px}
.stat-val{font-size:20px;font-weight:700}
.toolbar{background:#fff;border-radius:10px;padding:10px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.search{width:100%;font-size:14px;padding:9px 12px;border-radius:8px;border:1px solid #ddd;outline:none;margin-bottom:8px}
.ctrl-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:500;border:1px solid #ccc;background:#fff;color:#333}
.chip.active{background:#1F3864;color:#fff;border-color:#1F3864}
.sortsel{font-size:12px;padding:7px 10px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#333}
.count{font-size:12px;color:#888;margin-bottom:8px}

.card{background:#fff;border-radius:10px;border:0.5px solid #e0e0e0;border-left-width:3px;margin-bottom:8px;overflow:hidden}
.card-h{padding:10px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:8px}
.chk{width:18px;height:18px;cursor:pointer;accent-color:#c62828;flex-shrink:0;margin-top:2px}
.ino{font-size:12px;font-weight:700;color:#1F3864;background:#e8eaf6;border-radius:4px;padding:1px 7px;white-space:nowrap}
.badge-s{font-size:11px;border-radius:4px;padding:1px 6px;white-space:nowrap}
.b-out{color:#185FA5;background:#e3f2fd}
.b-in{color:#1565c0;background:#e8f4ff}
.b-ac{color:#e65100;background:#fff3e0}
.nm{font-size:13px;color:#333;margin-top:3px;line-height:1.4}
.chev{color:#aaa;flex-shrink:0;font-size:12px;margin-top:2px}
.card-b{display:none;padding:0 14px 12px;border-top:1px solid #f0f0f0}
.card.open .card-b{display:block}
.iid{font-size:11px;color:#bbb;margin:8px 0}

.loading{display:none;text-align:center;padding:30px;color:#555;font-size:14px}
.err{display:none;background:#FCEBEB;border:1px solid #F09595;border-radius:10px;padding:12px 14px;color:#A32D2D;font-size:13px;margin-bottom:12px}

@media(max-width:480px){.tab{min-width:0;font-size:11px;padding:9px 3px}.db-label{min-width:0;width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <span style="font-size:24px">🔁</span>
    <div><h1>楽天 回遊バナー統合ツール</h1><p>商品CSVとアクセス資料を1回読み込めば全機能で共有</p></div>
  </div>

  <!-- データ読込 -->
  <div class="databar">
    <div class="databar-row">
      <span class="db-label">① 商品CSV / xlsx</span>
      <button class="db-btn db-btn-main" onclick="document.getElementById('mainFile').click()">ファイルを選択</button>
      <input type="file" id="mainFile" accept=".csv,.xlsx,.xls" style="display:none">
      <span class="db-st" id="mainSt">未読み込み（必須）</span>
    </div>
    <div class="databar-row">
      <span class="db-label">② アクセス資料CSV</span>
      <button class="db-btn db-btn-sub" onclick="document.getElementById('acFile').click()">ファイルを選択</button>
      <input type="file" id="acFile" accept=".csv" style="display:none">
      <span class="db-st" id="acSt">未読み込み（任意）</span>
    </div>
  </div>

  <div class="err" id="err"></div>
  <div class="loading" id="loading">⏳ 処理中...</div>

  <!-- タブ -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('banner',this)">🔁 バナー解析</button>
    <button class="tab" onclick="switchTab('inbound',this)">📊 回遊元</button>
    <button class="tab" onclick="switchTab('list',this)">🖼 バナー一覧</button>
  </div>

  <div class="panel active" id="panel-banner"><div class="empty" id="empty-banner">商品CSVを読み込んでください</div><div id="body-banner"></div></div>
  <div class="panel" id="panel-inbound"><div class="empty" id="empty-inbound">商品CSVを読み込んでください</div><div id="body-inbound"></div></div>
  <div class="panel" id="panel-list"><div class="empty" id="empty-list">商品CSVを読み込んでください</div><div id="body-list"></div></div>
</div>

<!-- 新規バナー作成モーダル -->
<div id="newModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:14px;padding:20px;max-width:520px;width:92%;max-height:88vh;overflow-y:auto">
    <div style="font-size:16px;font-weight:700;color:#1F3864;margin-bottom:8px">➕ 新規バナーを作成（上2枚・下2枚）</div>
    <div style="font-size:13px;color:#555;margin-bottom:12px;line-height:1.6">各枠にバナーを設定。入力した枠だけ追加されます。</div>
    <div id="slots"></div>
    <label style="font-size:12px;font-weight:600;color:#555;display:block;margin:14px 0 4px">商品を検索して追加先を選ぶ</label>
    <input type="text" id="prodSearch" placeholder="🔍 例: ジムニー" oninput="searchProd()" style="width:100%;font-size:13px;padding:8px 10px;border-radius:6px;border:1px solid #ddd;box-sizing:border-box">
    <div id="prodResult" style="max-height:240px;overflow-y:auto;margin-top:6px"></div>
    <label style="font-size:12px;font-weight:600;color:#555;display:block;margin:12px 0 4px">追加先の商品管理番号（カンマ・改行区切り／上で選ぶと自動追加）</label>
    <textarea id="targetIds" placeholder="例: 10000056, 10000061" style="width:100%;min-height:60px;font-size:13px;padding:8px 10px;border-radius:6px;border:1px solid #ddd;box-sizing:border-box;resize:vertical"></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button onclick="closeNew()" style="font-size:13px;padding:8px 18px;border-radius:8px;background:#fff;border:1px solid #ccc;color:#555;cursor:pointer;font-weight:600">キャンセル</button>
      <button onclick="dlNew()" style="font-size:13px;padding:8px 18px;border-radius:8px;background:#1F3864;color:#fff;border:none;cursor:pointer;font-weight:600">追加CSVをDL</button>
    </div>
  </div>
</div>

<script>
// ===== グローバル共有データ =====
var DATA={
  products:[],   // {id,no,name,banners:[],inbound:[],outboundCount,inboundCount,access}
  idInfo:{},     // id→{no,name}
  accessMap:{},  // id→アクセス人数
  allBanners:[], // {link,img,dstId,dstNo,dstName,kind,count,items,itemList}
  rawHeaders:[], rawRows:[], colIdx:{}, shopName:'',
  loaded:false
};

// ===== ファイル読込 =====
document.getElementById('mainFile').addEventListener('change',function(e){if(e.target.files[0])loadMain(e.target.files[0]);e.target.value='';});
document.getElementById('acFile').addEventListener('change',function(e){if(e.target.files[0])loadAccess(e.target.files[0]);e.target.value='';});

function loadMain(file){
  var isX=/\.(xlsx|xls)$/i.test(file.name),isC=/\.csv$/i.test(file.name);
  if(!isX&&!isC){showErr('CSV または xlsx を選択してください');return;}
  showLoading(true);
  var r=new FileReader();
  r.onload=function(e){
    try{
      var rows;
      if(isX){var wb=XLSX.read(e.target.result,{type:'array'});rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});}
      else{var buf=e.target.result,b=new Uint8Array(buf),txt;if(b[0]===0xEF&&b[1]===0xBB&&b[2]===0xBF){txt=new TextDecoder('utf-8').decode(buf.slice(3));}else{txt=new TextDecoder('shift-jis',{fatal:false}).decode(buf);if(!(txt.split('\n')[0]||'').includes('商品管理番号')){var u=new TextDecoder('utf-8',{fatal:false}).decode(buf);if((u.split('\n')[0]||'').includes('商品管理番号'))txt=u;}}rows=parseCSV(txt);}
      processMain(rows);
      if(!DATA.products.length)throw new Error('商品データが見つかりませんでした。説明文入りの全項目CSVを使用してください。');
      DATA.loaded=true;
      document.getElementById('mainSt').textContent=DATA.products.length.toLocaleString()+'商品 読み込み完了';
      document.getElementById('mainSt').className='db-st ok';
      renderAll();
    }catch(ex){showErr(ex.message);}
    finally{showLoading(false);}
  };
  r.onerror=function(){showErr('読み込みエラー');showLoading(false);};
  r.readAsArrayBuffer(file);
}

function loadAccess(file){
  var r=new FileReader();
  r.onload=function(e){
    try{
      var txt=new TextDecoder('utf-8',{fatal:false}).decode(e.target.result);
      if(txt.indexOf('商品管理番号')<0){var s=new TextDecoder('shift-jis',{fatal:false}).decode(e.target.result);if(s.indexOf('商品管理番号')>=0)txt=s;}
      var lines=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
      var hi=-1,ci_id=-1,ci_ac=-1,ci_nm=-1,ci_no=-1;
      for(var i=0;i<lines.length;i++){
        var cols=parseCSVLine(lines[i]);
        var a=cols.findIndex(function(c){return c.trim()==='商品管理番号';});
        var b=cols.findIndex(function(c){return c.trim()==='アクセス人数';});
        if(a>=0&&b>=0){hi=i;ci_id=a;ci_ac=b;ci_nm=cols.findIndex(function(c){return c.trim()==='商品名';});ci_no=cols.findIndex(function(c){return c.trim()==='商品番号';});break;}
      }
      if(hi<0)throw new Error('「商品管理番号」「アクセス人数」列が見つかりません');
      DATA.accessMap={};var cnt=0;
      for(var j=hi+1;j<lines.length;j++){
        var cols=parseCSVLine(lines[j]);
        if(cols.length<=Math.max(ci_id,ci_ac))continue;
        var id=cols[ci_id].trim(),ac=parseInt(cols[ci_ac].trim().replace(/,/g,''));
        if(id&&!isNaN(ac)){
          DATA.accessMap[id]=ac;cnt++;
          if(!DATA.idInfo[id])DATA.idInfo[id]={no:ci_no>=0?(cols[ci_no]||'').trim():'',name:ci_nm>=0?(cols[ci_nm]||'').trim():''};
        }
      }
      // 商品にaccessを反映
      DATA.products.forEach(function(p){p.access=DATA.accessMap[p.id]!=null?DATA.accessMap[p.id]:null;});
      document.getElementById('acSt').textContent=cnt.toLocaleString()+'件 アクセス読み込み完了';
      document.getElementById('acSt').className='db-st ok';
      if(DATA.loaded)renderAll();
    }catch(ex){document.getElementById('acSt').textContent='エラー: '+ex.message;}
  };
  r.readAsArrayBuffer(file);
}

// ===== CSVパーサー =====
function parseCSV(t){t=t.replace(/\r\n/g,'\n').replace(/\r/g,'\n');var rows=[],i=0,n=t.length;while(i<n){var row=[],ok=false;while(i<n&&t[i]!=='\n'){if(t[i]==='"'){i++;var c='';while(i<n){if(t[i]==='"'&&t[i+1]==='"'){c+='"';i+=2;}else if(t[i]==='"'){i++;break;}else c+=t[i++];}row.push(c.trim());if(c.trim())ok=true;if(t[i]===',')i++;}else{var c='';while(i<n&&t[i]!==','&&t[i]!=='\n')c+=t[i++];row.push(c.trim());if(c.trim())ok=true;if(t[i]===',')i++;}}if(t[i]==='\n')i++;if(ok)rows.push(row);}return rows;}
function parseCSVLine(line){var out=[],i=0,n=line.length;while(i<n){if(line[i]==='"'){i++;var c='';while(i<n){if(line[i]==='"'&&line[i+1]==='"'){c+='"';i+=2;}else if(line[i]==='"'){i++;break;}else c+=line[i++];}out.push(c);if(line[i]===',')i++;}else{var c='';while(i<n&&line[i]!==',')c+=line[i++];out.push(c);if(line[i]===',')i++;}}return out;}

// ===== バナー抽出・分類 =====
var SHOPS=['beltaworks','gojou95'];
function classify(url,allIds){
  if(!url.startsWith('http'))return{kind:'不正URL',warn:true,cls:'b-del'};
  if(url.includes('soko.rms.rakuten.co.jp'))return{kind:'RMS管理画面リンク',warn:true,cls:'b-rms',msg:'購入者がRMSログイン画面に飛びます。item.rakuten.co.jp に修正を。'};
  var cm=/\/c\/(\d+)/.exec(url);
  if(cm)return{kind:'カテゴリページ',warn:true,cls:'b-cat',catId:cm[1],msg:'カテゴリ一覧ページへのリンクです。'};
  if(url.includes('item.rakuten.co.jp')){var m=url.match(/item\.rakuten\.co\.jp\/([^\/]+)\/([^\/\?#\s]+)/);if(m){var shop=m[1],pid=m[2].replace(/\/$/,'');if(SHOPS.indexOf(shop)<0)return{kind:'他店舗（'+shop+'）',warn:true,cls:'b-shop',msg:'自社以外のショップへのリンクです。'};if(pid&&allIds.indexOf(pid)<0)return{kind:'削除済み・リンク切れ',warn:true,cls:'b-del',msg:'リンク先商品（'+pid+'）がCSV内にありません。'};return{kind:'商品ページ',warn:false,cls:'b-item'};}}
  if(url.includes('rakuten.co.jp'))return{kind:'楽天内（商品以外）',warn:false,cls:'b-rak'};
  return{kind:'外部サイト',warn:true,cls:'b-ext',msg:'楽天外のリンクです。'};
}
function getBanners(html,field,allIds){if(!html)return[];var p=/<a\s+href=["']([^"']+)["'][^>]*>\s*<img\s[^>]*src=["']([^"']+)["'][^>]*>\s*<\/a>/gi,m,out=[];while((m=p.exec(html))!==null){var lk=m[1].trim(),im=m[2].trim();out.push(Object.assign({link:lk,img:im,field:field},classify(lk,allIds)));}return out;}
function getDstId(url){if(/\/c\/\d+/.test(url))return null;var m=url.match(/(?:item\.rakuten\.co\.jp|soko\.rms\.rakuten\.co\.jp)\/[^\/]+\/([^\/\?#\s]+)/);return m?m[1].replace(/\/$/,''):null;}

// ===== メイン処理 =====
function processMain(rows){
  if(rows.length<2){DATA.products=[];return;}
  DATA.rawHeaders=rows[0];DATA.rawRows=rows.slice(1);
  var h=rows[0],idx=function(n){return h.findIndex(function(c){return String(c).trim()===n;});};
  DATA.colIdx={id:idx('商品管理番号（商品URL）'),no:idx('商品番号'),name:idx('商品名'),pc:idx('PC用商品説明文'),sp:idx('スマートフォン用商品説明文'),sv:idx('PC用販売説明文')};
  var C=DATA.colIdx;
  if(C.id<0||C.name<0){DATA.products=[];return;}
  // ショップ名推定
  DATA.shopName='';
  for(var si=0;si<DATA.rawRows.length&&!DATA.shopName;si++){[C.pc,C.sp,C.sv].forEach(function(ci){if(ci<0||DATA.shopName)return;var mm=String(DATA.rawRows[si][ci]||'').match(/item\.rakuten\.co\.jp\/([^\/]+)\//);if(mm)DATA.shopName=mm[1];});}
  if(!DATA.shopName)DATA.shopName='beltaworks';

  DATA.idInfo={};var raw=[],seen={};
  DATA.rawRows.forEach(function(row){
    var iid=String(row[C.id]||'').trim(),nm=String(row[C.name]||'').trim();
    if(!nm||seen[iid])return;seen[iid]=true;
    var ino=String(row[C.no]||'').trim();
    DATA.idInfo[iid]={no:ino,name:nm};
    raw.push({id:iid,no:ino,name:nm,_pc:String(row[C.pc]||''),_sp:String(row[C.sp]||''),_sv:String(row[C.sv]||'')});
  });
  var allIds=Object.keys(DATA.idInfo);

  // バナー付与
  raw.forEach(function(p){
    var ab=getBanners(p._pc,'PC説明文',allIds).concat(getBanners(p._sp,'SP説明文',allIds),getBanners(p._sv,'PC販売説明文',allIds));
    var lm={};ab.forEach(function(b){if(!lm[b.link])lm[b.link]=Object.assign({},b,{fields:[b.field]});else if(lm[b.link].fields.indexOf(b.field)<0)lm[b.link].fields.push(b.field);});
    p.banners=Object.values(lm);
  });

  // 回遊元マップ
  var inMap={};
  raw.forEach(function(p){p.banners.forEach(function(b){var d=getDstId(b.link);if(!d)return;if(!inMap[d])inMap[d]=[];if(!inMap[d].find(function(x){return x.srcId===p.id;}))inMap[d].push({srcId:p.id,srcNo:p.no});});});

  // 商品に集計値を付与
  DATA.products=raw.map(function(p){
    var banners=p.banners.map(function(b){var d=getDstId(b.link),info=d?DATA.idInfo[d]:null;return Object.assign({},b,{dstId:d||null,dstNo:info?info.no:null,dstName:info?info.name:null});});
    var inbound=inMap[p.id]||[];
    return Object.assign({},p,{banners:banners,inbound:inbound,outboundCount:banners.length,inboundCount:inbound.length,access:DATA.accessMap[p.id]!=null?DATA.accessMap[p.id]:null});
  });

  // 全バナー収集
  collectBanners(inMap);
}

function collectBanners(inMap){
  var bmap={};
  DATA.products.forEach(function(p){
    p.banners.forEach(function(b){
      var key=b.link+'|'+b.img;
      if(!bmap[key]){bmap[key]={link:b.link,img:b.img,dstId:b.dstId,dstNo:b.dstNo,dstName:b.dstName,kind:b.kind,cls:b.cls,count:0,items:{},itemList:[]};}
      if(!bmap[key].items[p.id]){bmap[key].items[p.id]=true;bmap[key].count++;bmap[key].itemList.push(p.id);}
    });
  });
  DATA.allBanners=Object.keys(bmap).map(function(k){return bmap[k];}).sort(function(a,b){return b.count-a.count;});
}

// ===== タブ切替 =====
function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('panel-'+name).classList.add('active');
}

// ===== 全タブ描画 =====
function renderAll(){
  renderBanner();
  renderInbound();
  renderList();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showLoading(on){document.getElementById('loading').style.display=on?'block':'none';}
function showErr(msg){document.getElementById('err').textContent='⚠ '+msg;document.getElementById('err').style.display='block';setTimeout(function(){document.getElementById('err').style.display='none';},6000);}

// ===== 共通：並び替え =====
function sortProducts(arr,key){
  var a=arr.slice();
  if(key==='access_desc')a.sort(function(x,y){return (y.access||0)-(x.access||0);});
  else if(key==='access_asc')a.sort(function(x,y){return (x.access||0)-(y.access||0);});
  else if(key==='out_desc')a.sort(function(x,y){return y.outboundCount-x.outboundCount;});
  else if(key==='out_asc')a.sort(function(x,y){return x.outboundCount-y.outboundCount;});
  else if(key==='in_desc')a.sort(function(x,y){return y.inboundCount-x.inboundCount;});
  else if(key==='in_asc')a.sort(function(x,y){return x.inboundCount-y.inboundCount;});
  return a;
}
var SORT_OPTS='<option value="default">並び順: 標準</option><option value="access_desc">アクセス多い順</option><option value="access_asc">アクセス少ない順</option><option value="out_desc">回遊先多い順</option><option value="out_asc">回遊先少ない順</option><option value="in_desc">回遊元多い順</option><option value="in_asc">回遊元少ない順</option>';

// 商品カードの統計バッジ
function statBadges(p){
  var s='';
  if(p.outboundCount)s+='<span class="badge-s b-out">回遊先'+p.outboundCount+'</span>';
  if(p.inboundCount)s+='<span class="badge-s b-in">回遊元'+p.inboundCount+'</span>';
  if(p.access!=null)s+='<span class="badge-s b-ac">PV'+p.access.toLocaleString()+'</span>';
  return s;
}

// ===== タブ1: バナー解析 =====
var bnState={filter:'all',sort:'default',q:''};
function renderBanner(){
  document.getElementById('empty-banner').style.display='none';
  var tb=DATA.products.reduce(function(s,p){return s+p.outboundCount;},0);
  var wn=DATA.products.reduce(function(s,p){return s+p.banners.filter(function(b){return b.warn;}).length;},0);
  var nb=DATA.products.filter(function(p){return!p.outboundCount;}).length;
  document.getElementById('body-banner').innerHTML=
    '<div class="stats" style="grid-template-columns:repeat(4,1fr)">'
    +'<div class="stat"><div class="stat-label">商品数</div><div class="stat-val" style="color:#1F3864">'+DATA.products.length.toLocaleString()+'</div></div>'
    +'<div class="stat"><div class="stat-label">バナー総数</div><div class="stat-val" style="color:#185FA5">'+tb.toLocaleString()+'</div></div>'
    +'<div class="stat"><div class="stat-label">⚠要確認</div><div class="stat-val" style="color:#e65100">'+wn.toLocaleString()+'</div></div>'
    +'<div class="stat"><div class="stat-label">バナーなし</div><div class="stat-val" style="color:#9e9e9e">'+nb.toLocaleString()+'</div></div></div>'
    +'<div class="toolbar"><input class="search" id="bn-q" placeholder="🔍 商品名・番号・管理番号・回遊先で検索" oninput="bnState.q=this.value;drawBanner()">'
    +'<div class="ctrl-row">'
    +'<button class="chip active" data-f="all" onclick="bnSetF(\'all\',this)">全件</button>'
    +'<button class="chip" data-f="warn" onclick="bnSetF(\'warn\',this)">⚠要確認</button>'
    +'<button class="chip" data-f="none" onclick="bnSetF(\'none\',this)">バナーなし</button>'
    +'<select class="sortsel" id="bn-sort" onchange="bnState.sort=this.value;drawBanner()">'+SORT_OPTS+'</select>'
    +'</div></div><div class="count" id="bn-count"></div><div id="bn-list"></div>';
  drawBanner();
}
function bnSetF(f,btn){bnState.filter=f;document.querySelectorAll('#body-banner .chip').forEach(function(c){c.classList.remove('active');});btn.classList.add('active');drawBanner();}
function drawBanner(){
  var q=bnState.q.toLowerCase().trim();
  var arr=DATA.products.filter(function(p){
    if(bnState.filter==='warn'&&!p.banners.some(function(b){return b.warn;}))return false;
    if(bnState.filter==='none'&&p.outboundCount)return false;
    if(q){var t=(p.no+' '+p.name+' '+p.id+' '+p.banners.map(function(b){return (b.dstNo||'')+(b.dstName||'')+(b.dstId||'')+b.link;}).join(' ')).toLowerCase();if(t.indexOf(q)<0)return false;}
    return true;
  });
  if(bnState.sort!=='default')arr=sortProducts(arr,bnState.sort);
  document.getElementById('bn-count').textContent=arr.length.toLocaleString()+'件表示';
  document.getElementById('bn-list').innerHTML=arr.map(function(p){
    var hw=p.banners.some(function(b){return b.warn;}),left=hw?'#f57f17':(!p.outboundCount?'#bbb':'#4caf50');
    var bans=!p.outboundCount?'<div style="font-size:12px;color:#bbb;font-style:italic;padding:4px 0">バナー未設定</div>':p.banners.map(function(b){
      var dst=b.dstNo?'<div style="font-size:13px;font-weight:700;color:#2e7d32;margin:4px 0 2px">先: '+esc(b.dstNo)+' <span style="font-weight:400;font-size:11px;color:#888">'+esc((b.dstName||'').slice(0,22))+'</span></div>':(b.dstId?'<div style="font-size:11px;color:#888;margin:4px 0">管理番号: '+esc(b.dstId)+'</div>':'');
      var wm=b.msg?'<div style="font-size:11px;color:#e65100;background:#fff8e1;border-radius:4px;padding:5px 7px;margin-top:4px">⚠ '+esc(b.msg)+'</div>':'';
      return '<div style="background:#f8f8f8;border-radius:8px;padding:8px 10px;margin-bottom:6px"><span style="font-size:11px;font-weight:600;color:#555">['+esc(b.kind)+']</span> <span style="font-size:11px;color:#888">'+esc(b.fields.join('/'))+'</span>'+dst+'<div style="font-size:11px;color:#555;word-break:break-all;margin-top:2px">'+esc(b.link)+'</div>'+wm+'</div>';
    }).join('');
    return '<div class="card" style="border-left-color:'+left+'"><div class="card-h" onclick="this.parentElement.classList.toggle(\'open\')"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:3px"><span class="ino">'+esc(p.no||p.id)+'</span>'+statBadges(p)+(hw?'<span style="color:#e65100">⚠</span>':'')+'</div><div class="nm">'+esc(p.name.length>52?p.name.slice(0,52)+'…':p.name)+'</div></div><span class="chev">▼</span></div><div class="card-b"><div class="iid">管理番号: '+esc(p.id)+'</div>'+bans+'</div></div>';
  }).join('');
}

// ===== タブ2: 回遊元 =====
var inState={filter:'all',sort:'default',q:''};
function renderInbound(){
  document.getElementById('empty-inbound').style.display='none';
  var withIn=DATA.products.filter(function(p){return p.inboundCount>0;}).length;
  var noIn=DATA.products.length-withIn;
  var maxIn=DATA.products.reduce(function(m,p){return Math.max(m,p.inboundCount);},0);
  document.getElementById('body-inbound').innerHTML=
    '<div class="stats" style="grid-template-columns:repeat(3,1fr)">'
    +'<div class="stat"><div class="stat-label">回遊先あり</div><div class="stat-val" style="color:#1F3864">'+withIn.toLocaleString()+'</div></div>'
    +'<div class="stat"><div class="stat-label">最大回遊元</div><div class="stat-val" style="color:#e65100">'+maxIn.toLocaleString()+'</div></div>'
    +'<div class="stat"><div class="stat-label">回遊元なし</div><div class="stat-val" style="color:#9e9e9e">'+noIn.toLocaleString()+'</div></div></div>'
    +'<div class="toolbar"><input class="search" id="in-q" placeholder="🔍 商品名・番号・管理番号で検索" oninput="inState.q=this.value;drawInbound()">'
    +'<div class="ctrl-row">'
    +'<button class="chip active" data-f="all" onclick="inSetF(\'all\',this)">全件</button>'
    +'<button class="chip" data-f="100" onclick="inSetF(\'100\',this)">100件以上</button>'
    +'<button class="chip" data-f="10" onclick="inSetF(\'10\',this)">10件以上</button>'
    +'<button class="chip" data-f="none" onclick="inSetF(\'none\',this)">設定なし</button>'
    +'<select class="sortsel" id="in-sort" onchange="inState.sort=this.value;drawInbound()">'+SORT_OPTS+'</select>'
    +'</div></div><div class="count" id="in-count"></div><div id="in-list"></div>';
  drawInbound();
}
function inSetF(f,btn){inState.filter=f;document.querySelectorAll('#body-inbound .chip').forEach(function(c){c.classList.remove('active');});btn.classList.add('active');drawInbound();}
function drawInbound(){
  var q=inState.q.toLowerCase().trim();
  var arr=DATA.products.filter(function(p){
    var c=p.inboundCount;
    if(inState.filter==='100'&&c<100)return false;
    if(inState.filter==='10'&&c<10)return false;
    if(inState.filter==='none'&&c>0)return false;
    if(q&&(p.no+' '+p.name+' '+p.id).toLowerCase().indexOf(q)<0)return false;
    return true;
  });
  // デフォルトは回遊元多い順
  if(inState.sort==='default')arr=sortProducts(arr,'in_desc');
  else arr=sortProducts(arr,inState.sort);
  document.getElementById('in-count').textContent=arr.length.toLocaleString()+'件表示';
  document.getElementById('in-list').innerHTML=arr.map(function(p){
    var c=p.inboundCount,col=c>=100?'#e65100':c>=10?'#1565c0':c>0?'#2e7d32':'#9e9e9e';
    var left=c>=100?'#f57f17':c>=10?'#1565c0':c>0?'#4caf50':'#bbb';
    var body=c>0?'<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f4f6fb"><th style="padding:6px 10px;font-size:11px;color:#888;text-align:left"></th><th style="padding:6px 10px;font-size:11px;color:#888;text-align:left">商品番号</th><th style="padding:6px 10px;font-size:11px;color:#888;text-align:left">管理番号</th></tr></thead><tbody>'+p.inbound.map(function(s,i){return '<tr><td style="padding:6px 10px;font-size:12px;color:#888;border-bottom:1px solid #f5f5f5">回遊元'+(i+1)+'</td><td style="padding:6px 10px;font-size:12px;font-weight:600;border-bottom:1px solid #f5f5f5">'+esc(s.srcNo||s.srcId)+'</td><td style="padding:6px 10px;font-size:11px;color:#555;border-bottom:1px solid #f5f5f5">'+esc(s.srcId)+'</td></tr>';}).join('')+'</tbody></table>':'<div style="padding:10px 0;font-size:12px;color:#9e9e9e;font-style:italic">どの商品のバナーからも回遊されていません</div>';
    return '<div class="card" style="border-left-color:'+left+'"><div class="card-h" onclick="this.parentElement.classList.toggle(\'open\')"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px"><span class="ino">'+esc(p.no||p.id)+'</span><span style="font-size:13px;font-weight:700;color:'+col+'">'+(c>0?c+'ページから回遊中':'回遊元なし')+'</span>'+(p.access!=null?'<span class="badge-s b-ac">PV'+p.access.toLocaleString()+'</span>':'')+(p.outboundCount?'<span class="badge-s b-out">回遊先'+p.outboundCount+'</span>':'')+'</div><div class="nm">'+esc(p.name.slice(0,48))+(p.name.length>48?'…':'')+'</div><div class="iid">管理番号: '+esc(p.id)+'</div></div><span class="chev">▼</span></div><div class="card-b">'+body+'</div></div>';
  }).join('');
}

// ===== タブ3: バナー一覧 =====
var liState={sort:'count_desc',q:''};
function renderList(){
  document.getElementById('empty-list').style.display='none';
  var totalUse=DATA.allBanners.reduce(function(s,b){return s+b.count;},0);
  document.getElementById('body-list').innerHTML=
    '<div class="stats" style="grid-template-columns:repeat(2,1fr)">'
    +'<div class="stat"><div class="stat-label">バナー種類</div><div class="stat-val" style="color:#1F3864">'+DATA.allBanners.length.toLocaleString()+'</div></div>'
    +'<div class="stat"><div class="stat-label">のべ使用数</div><div class="stat-val" style="color:#185FA5">'+totalUse.toLocaleString()+'</div></div></div>'
    +'<div style="margin-bottom:10px"><button onclick="openNew()" style="width:100%;font-size:13px;padding:10px;border-radius:8px;background:#1F3864;color:#fff;border:none;cursor:pointer;font-weight:600">➕ 新規バナーを作成して商品に追加</button></div>'
    +'<div class="toolbar"><input class="search" id="li-q" placeholder="🔍 リンク先・商品名・管理番号・画像URLで検索" oninput="liState.q=this.value;drawList()">'
    +'<div class="ctrl-row"><select class="sortsel" id="li-sort" onchange="liState.sort=this.value;drawList()">'
    +'<option value="count_desc">使用数多い順</option><option value="count_asc">使用数少ない順</option></select></div></div>'
    +'<div class="count" id="li-count"></div><div id="li-list"></div>';
  drawList();
}
function drawList(){
  var q=liState.q.toLowerCase().trim();
  var arr=DATA.allBanners.filter(function(b){if(!q)return true;return ((b.dstNo||'')+' '+(b.dstName||'')+' '+(b.dstId||'')+' '+b.link+' '+b.img).toLowerCase().indexOf(q)>=0;});
  if(liState.sort==='count_asc')arr=arr.slice().sort(function(a,b){return a.count-b.count;});
  else arr=arr.slice().sort(function(a,b){return b.count-a.count;});
  document.getElementById('li-count').textContent=arr.length.toLocaleString()+'件表示';
  document.getElementById('li-list').innerHTML=arr.map(function(b){
    var dstLabel=b.dstNo?esc(b.dstNo)+'　'+esc((b.dstName||'').slice(0,22)):esc(b.kind);
    var ex=b.itemList&&b.itemList.length?'<div style="margin-top:6px"><a href="https://item.rakuten.co.jp/'+esc(DATA.shopName)+'/'+esc(b.itemList[0])+'/" target="_blank" style="font-size:11px;color:#185FA5;text-decoration:none;font-weight:600">🔍 使用例の商品ページを見る↗</a></div>':'';
    return '<div class="card" style="border-left-color:#7b1fa2;padding:12px"><div style="display:flex;gap:12px;align-items:flex-start"><div style="width:80px;height:80px;flex-shrink:0;border-radius:8px;overflow:hidden;background:#f0f0f0;border:1px solid #eee"><img src="'+esc(b.img)+'" loading="lazy" referrerpolicy="no-referrer" data-fb="0" data-orig="'+esc(b.img)+'" onerror="imgFB(this)" style="width:100%;height:100%;object-fit:cover"></div><div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:700;color:#555;margin-bottom:3px">['+esc(b.kind)+']</div><div style="font-size:13px;font-weight:700;color:#1F3864">'+dstLabel+'</div><div style="font-size:11px;color:#888;word-break:break-all;margin:3px 0">'+esc(b.link)+'</div><span style="font-size:11px;color:#185FA5;background:#e3f2fd;border-radius:4px;padding:1px 7px">'+b.count+'商品で使用</span>'+ex+'</div></div></div>';
  }).join('');
}
function imgFB(img){var s=parseInt(img.getAttribute('data-fb')||'0'),o=img.getAttribute('data-orig');if(s===0){img.setAttribute('data-fb','1');img.src='https://images.weserv.nl/?url='+encodeURIComponent(o.replace(/^https?:\/\//,''))+'&w=160&h=160&fit=cover';}else if(s===1){img.setAttribute('data-fb','2');img.src='https://wsrv.nl/?url='+encodeURIComponent(o.replace(/^https?:\/\//,''))+'&w=160&h=160&fit=cover';}else{img.parentElement.innerHTML='<div style="font-size:9px;color:#bbb;text-align:center;padding-top:28px;line-height:1.4">画像は<br>商品ページ<br>で確認</div>';}}

// ===== 新規バナー作成 =====
function openNew(){
  document.getElementById('slots').innerHTML=[['top1','上①'],['top2','上②'],['bot1','下①'],['bot2','下②']].map(function(p){
    var k=p[0];
    return '<div style="border:1px solid #e0e0e0;border-radius:8px;padding:10px;margin-bottom:8px;background:#fafafa"><div style="font-size:12px;font-weight:700;color:#1F3864;margin-bottom:6px">'+p[1]+'</div>'
      +'<select id="m_'+k+'" onchange="document.getElementById(\''+k+'_id\').style.display=this.value==\'id\'?\'block\':\'none\';document.getElementById(\''+k+'_url\').style.display=this.value==\'url\'?\'block\':\'none\'" style="font-size:12px;padding:6px;border-radius:6px;border:1px solid #ddd;margin-bottom:6px"><option value="id">管理番号から生成</option><option value="url">URL直接</option></select>'
      +'<input type="text" id="'+k+'_id" placeholder="回遊先の管理番号" style="width:100%;font-size:12px;padding:7px 9px;border-radius:6px;border:1px solid #ddd;box-sizing:border-box;margin-bottom:6px">'
      +'<input type="text" id="'+k+'_url" placeholder="リンク先URL" style="display:none;width:100%;font-size:12px;padding:7px 9px;border-radius:6px;border:1px solid #ddd;box-sizing:border-box;margin-bottom:6px">'
      +'<input type="text" id="'+k+'_img" placeholder="画像URL" style="width:100%;font-size:12px;padding:7px 9px;border-radius:6px;border:1px solid #ddd;box-sizing:border-box">'
    +'</div>';
  }).join('');
  document.getElementById('prodSearch').value='';
  document.getElementById('prodResult').innerHTML='';
  document.getElementById('targetIds').value='';
  document.getElementById('newModal').style.display='flex';
}
function closeNew(){document.getElementById('newModal').style.display='none';}
function searchProd(){
  var q=(document.getElementById('prodSearch').value||'').toLowerCase().trim();
  var box=document.getElementById('prodResult');
  if(!q){box.innerHTML='';return;}
  var hits=DATA.products.filter(function(p){return (p.name+' '+p.no+' '+p.id).toLowerCase().indexOf(q)>=0;});
  hits.sort(function(a,b){return (b.access||0)-(a.access||0)||b.inboundCount-a.inboundCount;});
  if(!hits.length){box.innerHTML='<div style="font-size:12px;color:#888;padding:8px">該当商品なし</div>';return;}
  box.innerHTML=hits.slice(0,50).map(function(h){
    var ac=h.access!=null?h.access.toLocaleString()+'人':'—';
    return '<div onclick="addTarget(\''+esc(h.id)+'\')" style="display:flex;gap:8px;align-items:center;padding:7px 8px;border-bottom:1px solid #f0f0f0;cursor:pointer"><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:#1F3864">'+esc(h.no||h.id)+' <span style="font-weight:400;color:#888">'+esc(h.name.slice(0,20))+'</span></div><div style="font-size:11px;color:#888;margin-top:2px">管理番号: '+esc(h.id)+'　回遊先:<b style="color:#185FA5">'+h.outboundCount+'</b>　回遊元:<b style="color:#1565c0">'+h.inboundCount+'</b>　PV:<b style="color:#e65100">'+ac+'</b></div></div><span style="font-size:18px;color:#2e7d32">＋</span></div>';
  }).join('')+(hits.length>50?'<div style="font-size:11px;color:#888;padding:6px">…他'+(hits.length-50)+'件</div>':'');
}
function addTarget(id){var ta=document.getElementById('targetIds');var ids=ta.value.trim()?ta.value.split(/[,\s\n]+/).map(function(s){return s.trim();}).filter(function(s){return s;}):[];if(ids.indexOf(id)<0){ids.push(id);ta.value=ids.join(', ');}}
function slotBanner(k){var img=document.getElementById(k+'_img').value.trim();if(!img)return null;var mode=document.getElementById('m_'+k).value,link='';if(mode==='id'){var d=document.getElementById(k+'_id').value.trim();if(!d)return null;link='https://item.rakuten.co.jp/'+(DATA.shopName||'beltaworks')+'/'+d+'/';}else{link=document.getElementById(k+'_url').value.trim();if(!link)return null;}return '<a href="'+link+'"><img src="'+img+'" width="100%" border="0"></a>';}
function dlNew(){
  var tops=[slotBanner('top1'),slotBanner('top2')].filter(function(x){return x;});
  var bots=[slotBanner('bot1'),slotBanner('bot2')].filter(function(x){return x;});
  if(!tops.length&&!bots.length){alert('少なくとも1枠は画像URLとリンクを入力してください');return;}
  var ids=document.getElementById('targetIds').value.split(/[,\s\n]+/).map(function(s){return s.trim();}).filter(function(s){return s;});
  if(!ids.length){alert('追加先の管理番号を入力してください');return;}
  var topB=tops.join('<br>'),botB=bots.join('<br>');
  var C=DATA.colIdx,rowBy={};
  DATA.rawRows.forEach(function(row){var iid=String(row[C.id]||'').trim();if(iid&&!rowBy[iid])rowBy[iid]=row;});
  var rows=[['商品管理番号（商品URL）','PC用商品説明文','スマートフォン用商品説明文','PC用販売説明文']];
  var nf=[];
  ids.forEach(function(id){var row=rowBy[id];if(!row){nf.push(id);return;}function w(h){h=h||'';if(topB)h=topB+'<br>'+h;if(botB)h=h+'<br>'+botB;return h;}rows.push([id,w(String(row[C.pc]||'')),w(String(row[C.sp]||'')),w(String(row[C.sv]||''))]);});
  if(rows.length<2){alert('指定した管理番号がCSV内に見つかりませんでした');return;}
  dlCSV(rows,'新規バナー追加_更新用CSV.csv');
  if(nf.length)alert('CSV内に見つからない管理番号:\n'+nf.join(', '));
  closeNew();
}
document.getElementById('newModal').addEventListener('click',function(e){if(e.target===this)closeNew();});

// ===== CSV出力（iOS対応）=====
function dlCSV(rows,fname){
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c==null?'':c).replace(/"/g,'""')+'"';}).join(',');}).join('\r\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  if(/iP(hone|ad|od)/.test(navigator.userAgent)){
    var reader=new FileReader();
    reader.onload=function(){var w=window.open();if(w){w.document.write('<title>'+fname+'</title><p style=\"font-family:sans-serif;padding:16px;font-size:15px\">下のリンクを長押し→保存してください。<br><br><a href=\"'+reader.result+'\" download=\"'+fname+'\" style=\"font-size:16px;color:#1F3864;font-weight:bold\">⬇ '+fname+'</a></p>');}else{alert('ポップアップを許可してください');}};
    reader.readAsDataURL(blob);return;
  }
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
}
</script>
