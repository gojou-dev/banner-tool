<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>回遊バナー解析ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Arial,sans-serif;background:#f0f2f7;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:16px}
.header{background:#1F3864;color:#fff;border-radius:14px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.header h1{font-size:17px;font-weight:700}
.header p{font-size:11px;opacity:.7;margin-top:2px}
.dropzone{background:#fff;border:2px dashed #b0bec5;border-radius:14px;padding:40px 20px;text-align:center;cursor:pointer;transition:.15s;margin-bottom:16px}
.dropzone.drag{border-color:#378ADD;background:#e8f4ff}
.dropzone .icon{font-size:48px;margin-bottom:12px}
.dropzone .ttl{font-size:16px;font-weight:600;color:#1F3864;margin-bottom:6px}
.dropzone .sub{font-size:12px;color:#888;margin-bottom:16px}
.btn-sel{background:#1F3864;color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer}
.loading{display:none;text-align:center;padding:40px;background:#fff;border-radius:14px;margin-bottom:16px}
.err{display:none;background:#FCEBEB;border:1px solid #F09595;border-radius:10px;padding:14px 16px;color:#A32D2D;font-size:13px;margin-bottom:12px;line-height:1.6}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat{background:#fff;border-radius:10px;padding:12px 6px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-label{font-size:10px;color:#888;margin-bottom:3px}
.stat-val{font-size:22px;font-weight:700}
.toolbar{background:#fff;border-radius:10px;padding:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
#searchBox{width:100%;font-size:14px;padding:9px 12px;border-radius:8px;border:1px solid #ddd;margin-bottom:8px;outline:none}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filters button{font-size:12px;padding:7px 13px;border-radius:6px;cursor:pointer;font-weight:500;border:1px solid #ccc;background:#fff;color:#333}
.filters button.active{background:#1F3864;color:#fff;border-color:#1F3864}
.btn-csv{margin-left:auto;font-size:12px;padding:7px 14px;border-radius:6px;cursor:pointer;font-weight:600;background:#1F3864;color:#fff;border:none}
.btn-reset{font-size:12px;padding:7px 12px;border-radius:6px;cursor:pointer;background:#fff;border:1px solid #ccc;color:#555}
#count{font-size:12px;color:#888;margin-bottom:8px}
.card{background:#fff;border-radius:10px;border:0.5px solid #e0e0e0;border-left-width:3px;margin-bottom:8px;overflow:hidden}
.card-header{padding:11px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:8px}
.item-no{font-size:12px;font-weight:700;color:#1F3864;background:#e8eaf6;border-radius:4px;padding:1px 7px;white-space:nowrap}
.cnt{font-size:11px;border-radius:4px;padding:1px 6px;white-space:nowrap}
.cnt-out{color:#185FA5;background:#e3f2fd}
.cnt-in{color:#1565c0;background:#e8f4ff}
.item-name{font-size:13px;color:#333;margin-top:3px;line-height:1.4}
.chev{color:#aaa;flex-shrink:0;font-size:12px;margin-top:2px}
.card-body{display:none;padding:0 14px 12px;border-top:1px solid #f0f0f0}
.card.open .card-body{display:block}
.item-id{font-size:11px;color:#bbb;margin:8px 0 10px}
.in-box{margin-bottom:10px;padding:8px 10px;background:#f0f4ff;border-radius:8px;border-left:2px solid #90caf9}
.in-title{font-size:11px;color:#1565c0;font-weight:700;margin-bottom:6px}
.in-tags{display:flex;flex-wrap:wrap;gap:4px}
.in-tag{font-size:12px;background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;border-radius:5px;padding:2px 8px;font-weight:500}
.ban-title{font-size:11px;color:#1F3864;font-weight:700;margin-bottom:6px}
.ban-row{background:#f8f8f8;border-radius:8px;padding:9px 10px;margin-bottom:6px}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;border-width:1px;border-style:solid}
.b-item{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7}
.b-rms{background:#fff8e1;color:#e65100;border-color:#ffe082}
.b-rak{background:#e3f2fd;color:#1565c0;border-color:#90caf9}
.b-ext{background:#fce4ec;color:#b71c1c;border-color:#f48fb1}
.ban-field{font-size:11px;color:#888;margin-left:6px}
.dst-label{font-size:13px;font-weight:700;color:#2e7d32;margin:4px 0 2px}
.dst-name{font-weight:400;font-size:11px;color:#888;margin-left:6px}
.dst-id{font-weight:400;font-size:10px;color:#bbb;margin-left:6px}
.ban-url{font-size:11px;color:#555;word-break:break-all;margin-top:2px}
.warn-box{font-size:11px;color:#e65100;background:#fff8e1;border-radius:4px;padding:5px 7px;margin-top:5px;line-height:1.5}
.no-ban{font-size:12px;color:#bbb;font-style:italic;padding:4px 0}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <span style="font-size:28px">🔁</span>
    <div><h1>回遊バナー解析ツール</h1><p>RMS商品CSV / xlsx → バナー双方向マップ</p></div>
  </div>

  <div class="dropzone" id="dz">
    <div class="icon">📂</div>
    <div class="ttl">ファイルをタップ / ドロップ</div>
    <div class="sub">CSV（Shift-JIS）または xlsx に対応</div>
    <button class="btn-sel" onclick="document.getElementById('fi').click()">ファイルを選択</button>
    <input type="file" id="fi" accept=".csv,.xlsx,.xls" style="display:none">
  </div>
  <div class="loading" id="ld">⏳ 解析中...</div>
  <div class="err" id="er"></div>
  <div id="result" style="display:none">
    <div class="stats" id="stats"></div>
    <div class="toolbar">
      <input type="text" id="searchBox" placeholder="🔍 商品名・商品番号・管理番号で検索">
      <div class="filters">
        <button class="active" onclick="setF('all',this)">全件</button>
        <button onclick="setF('warn',this)">⚠ 要確認</button>
        <button onclick="setF('none',this)">バナーなし</button>
        <button onclick="setF('ok',this)">✓ 正常</button>
        <button class="btn-csv" onclick="dlCSV()">⬇ CSV出力</button>
        <button class="btn-reset" onclick="reset()">リセット</button>
      </div>
    </div>
    <div id="count"></div>
    <div id="list"></div>
  </div>
</div>
<script>
var prods=[],cf='all';

// ファイル選択
document.getElementById('fi').addEventListener('change',function(e){
  if(e.target.files[0]) load(e.target.files[0]);
  e.target.value='';
});
var dz=document.getElementById('dz');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag');});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);});

function load(file){
  var isX=/\.(xlsx|xls)$/i.test(file.name),isC=/\.csv$/i.test(file.name);
  if(!isX&&!isC){showErr('CSV または xlsx を選択してください');return;}
  showLd(true);
  var r=new FileReader();
  r.onload=function(e){
    try{
      var rows;
      if(isX){
        var wb=XLSX.read(e.target.result,{type:'array'});
        rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
      } else {
        var buf=e.target.result,b=new Uint8Array(buf),txt;
        if(b[0]===0xEF&&b[1]===0xBB&&b[2]===0xBF){txt=new TextDecoder('utf-8').decode(buf.slice(3));}
        else{
          txt=new TextDecoder('shift-jis',{fatal:false}).decode(buf);
          if(!(txt.split('\n')[0]||'').includes('商品管理番号')){
            var u=new TextDecoder('utf-8',{fatal:false}).decode(buf);
            if((u.split('\n')[0]||'').includes('商品管理番号'))txt=u;
          }
        }
        rows=parseCSV(txt);
      }
      var res=processRows(rows);
      if(!res.length)throw new Error('商品データが見つかりませんでした。説明文入りの全項目CSVを使用してください。');
      prods=res;
      render();
    }catch(ex){showErr(ex.message);}
    finally{showLd(false);}
  };
  r.onerror=function(){showErr('読み込みエラー');showLd(false);};
  r.readAsArrayBuffer(file);
}

function parseCSV(t){
  t=t.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  var rows=[],i=0,n=t.length;
  while(i<n){
    var row=[],ok=false;
    while(i<n&&t[i]!=='\n'){
      if(t[i]==='"'){
        i++;var c='';
        while(i<n){if(t[i]==='"'&&t[i+1]==='"'){c+='"';i+=2;}else if(t[i]==='"'){i++;break;}else c+=t[i++];}
        row.push(c.trim());if(c.trim())ok=true;if(t[i]===',')i++;
      } else {
        var c='';while(i<n&&t[i]!==','&&t[i]!=='\n')c+=t[i++];
        row.push(c.trim());if(c.trim())ok=true;if(t[i]===',')i++;
      }
    }
    if(t[i]==='\n')i++;
    if(ok)rows.push(row);
  }
  return rows;
}

function getBanners(html,field){
  if(!html)return[];
  var p=/<a\s+href=["']([^"']+)["'][^>]*>\s*<img\s[^>]*src=["']([^"']+)["'][^>]*>\s*<\/a>/gi,m,out=[];
  while((m=p.exec(html))!==null){
    var lk=m[1].trim(),im=m[2].trim(),k,w;
    if(lk.includes('soko.rms.rakuten.co.jp')){k='RMS管理画面リンク';w=true;}
    else if(lk.includes('item.rakuten.co.jp')){k='商品ページ';w=false;}
    else if(lk.includes('rakuten.co.jp')){k='楽天内';w=false;}
    else{k='外部リンク';w=true;}
    out.push({link:lk,img:im,kind:k,warn:w,field:field});
  }
  return out;
}

function getDstId(url){
  var m=url.match(/(?:item\.rakuten\.co\.jp|soko\.rms\.rakuten\.co\.jp)\/[^\/]+\/([^\/\?#\s]+)/);
  return m?m[1].replace(/\/$/,''):null;
}

function processRows(rows){
  if(rows.length<2)return[];
  var h=rows[0],idx=function(n){return h.findIndex(function(c){return String(c).trim()===n;});};
  var II=idx('商品管理番号（商品URL）'),IN=idx('商品番号'),IM=idx('商品名');
  var IP=idx('PC用商品説明文'),IS=idx('スマートフォン用商品説明文'),IV=idx('PC用販売説明文');
  if(II<0||IM<0)return[];
  var idInfo={},raw=[],seen={};
  for(var r=1;r<rows.length;r++){
    var row=rows[r],iid=String(row[II]||'').trim(),nm=String(row[IM]||'').trim();
    if(!nm||seen[iid])continue;
    seen[iid]=true;
    var ino=String(row[IN]||'').trim();
    idInfo[iid]={no:ino,name:nm};
    var allb=getBanners(String(row[IP]||''),'PC説明文').concat(getBanners(String(row[IS]||''),'SP説明文'),getBanners(String(row[IV]||''),'PC販売説明文'));
    var lm={};
    allb.forEach(function(b){if(!lm[b.link])lm[b.link]={...b,fields:[b.field]};else if(!lm[b.link].fields.includes(b.field))lm[b.link].fields.push(b.field);});
    raw.push({itemId:iid,itemNo:ino,name:nm,banners:Object.values(lm)});
  }
  var inMap={};
  raw.forEach(function(p){
    p.banners.forEach(function(b){
      var d=getDstId(b.link);if(!d)return;
      if(!inMap[d])inMap[d]=[];
      if(!inMap[d].find(function(x){return x.srcId===p.itemId;}))inMap[d].push({srcId:p.itemId,srcNo:p.itemNo});
    });
  });
  return raw.map(function(p){return{...p,banners:p.banners.map(function(b){var d=getDstId(b.link),info=d?idInfo[d]:null;return{...b,dstId:d||null,dstNo:info?info.no:null,dstName:info?info.name:null};}),inbound:inMap[p.itemId]||[]};});
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function bClass(k){if(k==='商品ページ')return'b-item';if(k==='RMS管理画面リンク')return'b-rms';if(k==='楽天内')return'b-rak';return'b-ext';}

function buildCard(p){
  var hw=p.banners.some(function(b){return b.warn;}),left=hw?'#f57f17':(!p.banners.length?'#bbb':'#4caf50');
  var co=p.banners.length?'<span class="cnt cnt-out">→'+p.banners.length+'件</span>':'';
  var ci=p.inbound.length?'<span class="cnt cnt-in">←'+p.inbound.length+'件</span>':'';
  var wi=hw?'<span style="color:#e65100">⚠</span>':'';
  var inH=p.inbound.length?'<div class="in-box"><div class="in-title">← 回遊元</div><div class="in-tags">'+p.inbound.map(function(x){return'<span class="in-tag">'+esc(x.srcNo||x.srcId)+'</span>';}).join('')+'</div></div>':'';
  var banH=!p.banners.length?'<div class="no-ban">バナー未設定</div>':'<div class="ban-title">→ 回遊先バナー（'+p.banners.length+'件）</div>'+p.banners.map(function(b){
    var dst=b.dstNo?'<div class="dst-label">先: '+esc(b.dstNo)+'<span class="dst-name">'+esc((b.dstName||'').slice(0,25))+'</span><span class="dst-id">('+esc(b.dstId)+')</span></div>':b.dstId?'<div style="font-size:11px;color:#888;margin:4px 0">管理番号: '+esc(b.dstId)+'（CSV内に対象商品なし）</div>':'';
    var wm=b.kind==='RMS管理画面リンク'?'<div class="warn-box">⚠ 購入者がクリックするとRMSログイン画面に飛びます。item.rakuten.co.jp のURLに修正してください。</div>':'';
    return'<div class="ban-row"><span class="badge '+bClass(b.kind)+'">'+esc(b.kind)+'</span><span class="ban-field">'+esc(b.fields.join(' / '))+'</span>'+dst+'<div class="ban-url">'+esc(b.link)+'</div>'+wm+'</div>';
  }).join('');
  return'<div class="card" style="border-left-color:'+left+'" data-warn="'+(hw?1:0)+'" data-none="'+(!p.banners.length?1:0)+'" data-ok="'+((!hw&&p.banners.length)?1:0)+'" data-text="'+esc((p.itemNo+' '+p.name+' '+p.itemId).toLowerCase())+'"><div class="card-header" onclick="tog(this)"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:3px"><span class="item-no">'+esc(p.itemNo||p.itemId)+'</span>'+co+ci+wi+'</div><div class="item-name">'+esc(p.name.length>55?p.name.slice(0,55)+'…':p.name)+'</div></div><span class="chev">▼</span></div><div class="card-body"><div class="item-id">'+esc(p.itemId)+'</div>'+inH+banH+'</div></div>';
}

function render(){
  var tb=prods.reduce(function(s,p){return s+p.banners.length;},0);
  var wn=prods.reduce(function(s,p){return s+p.banners.filter(function(b){return b.warn;}).length;},0);
  var nb=prods.filter(function(p){return!p.banners.length;}).length;
  document.getElementById('stats').innerHTML='<div class="stat"><div class="stat-label">商品数</div><div class="stat-val" style="color:#1F3864">'+prods.length.toLocaleString()+'</div></div><div class="stat"><div class="stat-label">バナー総数</div><div class="stat-val" style="color:#185FA5">'+tb.toLocaleString()+'</div></div><div class="stat"><div class="stat-label">⚠ 要確認</div><div class="stat-val" style="color:#e65100">'+wn.toLocaleString()+'</div></div><div class="stat"><div class="stat-label">バナーなし</div><div class="stat-val" style="color:#9e9e9e">'+nb.toLocaleString()+'</div></div>';
  document.getElementById('dz').style.display='none';
  document.getElementById('result').style.display='block';
  document.getElementById('ld').style.display='block';
  document.getElementById('ld').textContent='カード描画中...';
  setTimeout(function(){
    document.getElementById('list').innerHTML=prods.map(buildCard).join('');
    document.getElementById('ld').style.display='none';
    applyF();
  },50);
}

function tog(h){h.parentElement.classList.toggle('open');}

function setF(f,btn){cf=f;document.querySelectorAll('.filters button').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');applyF();}

function applyF(){
  var q=document.getElementById('searchBox').value.toLowerCase().trim(),v=0;
  document.querySelectorAll('.card').forEach(function(el){
    var mq=!q||el.dataset.text.includes(q),show=mq;
    if(cf==='warn')show=mq&&el.dataset.warn==='1';
    if(cf==='none')show=mq&&el.dataset.none==='1';
    if(cf==='ok')show=mq&&el.dataset.ok==='1';
    el.style.display=show?'':'none';if(show)v++;
  });
  document.getElementById('count').textContent=v.toLocaleString()+'件表示';
}

function reset(){prods=[];document.getElementById('dz').style.display='';document.getElementById('result').style.display='none';document.getElementById('searchBox').value='';cf='all';}

function showLd(on){document.getElementById('ld').style.display=on?'block':'none';document.getElementById('dz').style.display=on?'none':'';}

function showErr(msg){document.getElementById('er').textContent='⚠ '+msg;document.getElementById('er').style.display='block';showLd(false);}

function dlCSV(){
  var rows=[['商品管理番号','商品番号','商品名','掲載フィールド','No','リンク種別','警告','回遊先_管理番号','回遊先_商品番号','回遊先_商品名','回遊元_商品番号一覧','リンク先URL','画像URL']];
  prods.forEach(function(p){
    var inN=(p.inbound||[]).map(function(x){return x.srcNo||x.srcId;}).join(' / ');
    if(!p.banners.length){rows.push([p.itemId,p.itemNo,p.name,'—',0,'なし','','','','',inN,'（バナーなし）','']);}
    else{p.banners.forEach(function(b,i){rows.push([p.itemId,p.itemNo,p.name,b.fields.join('/'),i+1,b.kind,b.warn?'要確認':'OK',b.dstId||'',b.dstNo||'',b.dstName||'',inN,b.link,b.img]);});}
  });
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));a.download='回遊バナー一覧.csv';a.click();
}

document.getElementById('searchBox').addEventListener('input',applyF);
</script>
</body>
</html>
