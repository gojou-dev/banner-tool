<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>回遊元レポート</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Arial,sans-serif;background:#f0f2f7;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:16px}
.header{background:#1F3864;color:#fff;border-radius:14px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.header h1{font-size:17px;font-weight:700}
.header p{font-size:11px;opacity:.7;margin-top:2px}
.dropzone{background:#fff;border:2px dashed #b0bec5;border-radius:14px;padding:40px 20px;text-align:center;transition:.15s;margin-bottom:16px}
.dropzone.drag{border-color:#378ADD;background:#e8f4ff}
.icon{font-size:48px;margin-bottom:12px}
.ttl{font-size:16px;font-weight:600;color:#1F3864;margin-bottom:6px}
.sub{font-size:12px;color:#888;margin-bottom:16px}
.btn-sel{background:#1F3864;color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer}
.loading{display:none;text-align:center;padding:40px;background:#fff;border-radius:14px;margin-bottom:16px}
.err{display:none;background:#FCEBEB;border:1px solid #F09595;border-radius:10px;padding:14px 16px;color:#A32D2D;font-size:13px;margin-bottom:12px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:#fff;border-radius:10px;padding:12px 6px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-label{font-size:10px;color:#888;margin-bottom:3px}
.stat-val{font-size:22px;font-weight:700}
.sel-bar{display:none;background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);align-items:center;gap:10px;flex-wrap:wrap}
.sel-bar.show{display:flex}
.sel-count{font-size:13px;font-weight:600;color:#c62828}
.btn-sel-all{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #ccc;background:#fff;cursor:pointer}
.btn-sel-clear{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #ccc;background:#fff;cursor:pointer}
.btn-del-sel{font-size:12px;padding:6px 14px;border-radius:6px;background:#c62828;color:#fff;border:none;cursor:pointer;font-weight:600;margin-left:auto}
.toolbar{background:#fff;border-radius:10px;padding:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
#searchBox{width:100%;font-size:14px;padding:9px 12px;border-radius:8px;border:1px solid #ddd;margin-bottom:8px;outline:none}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filters button{font-size:12px;padding:7px 13px;border-radius:6px;cursor:pointer;font-weight:500;border:1px solid #ccc;background:#fff;color:#333}
.filters button.active{background:#1F3864;color:#fff;border-color:#1F3864}
.btn-reset{font-size:12px;padding:7px 12px;border-radius:6px;cursor:pointer;background:#fff;border:1px solid #ccc;color:#555;margin-left:auto}
#count{font-size:12px;color:#888;margin-bottom:8px}
.card{background:#fff;border-radius:10px;border:0.5px solid #e0e0e0;border-left:3px solid #1F3864;margin-bottom:8px;overflow:hidden}
.card-header{padding:12px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:8px}
.chk-col{display:flex;align-items:center;padding:0 4px 0 0;flex-shrink:0}
.chk-col input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#c62828}
.item-no{font-size:13px;font-weight:700;color:#1F3864;background:#e8eaf6;border-radius:5px;padding:2px 9px;white-space:nowrap}
.cnt-label{font-size:13px;font-weight:700}
.item-name{font-size:12px;color:#555;margin-top:3px}
.item-id-s{font-size:10px;color:#bbb;margin-top:2px}
.chev{color:#aaa;flex-shrink:0;font-size:12px;margin-top:4px}
.card-body{display:none;border-top:1px solid #f0f0f0;overflow-x:auto}
.card.open .card-body{display:block}
table{width:100%;border-collapse:collapse}
th{padding:6px 10px;font-size:11px;color:#888;text-align:left;font-weight:600;background:#f4f6fb}
td{padding:8px 10px;font-size:12px;border-bottom:1px solid #f5f5f5;white-space:nowrap}
td.nm{white-space:normal;color:#777}
td.idx{color:#888}
td.no{font-weight:600}
td.id{color:#555}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:24px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:#c62828;margin-bottom:8px}
.modal-desc{font-size:13px;color:#555;margin-bottom:16px;line-height:1.6}
.del-list{font-size:12px;color:#333;margin-bottom:16px;max-height:200px;overflow-y:auto;border:1px solid #eee;border-radius:8px;padding:8px}
.del-item{padding:4px 0;border-bottom:1px solid #f5f5f5}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{font-size:13px;padding:8px 18px;border-radius:8px;cursor:pointer;font-weight:600}
.btn-cancel{background:#fff;border:1px solid #ccc;color:#555}
.btn-confirm{background:#c62828;color:#fff;border:none}
@media(max-width:480px){.stats{grid-template-columns:repeat(3,1fr)}.stat-val{font-size:18px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <span style="font-size:28px">📊</span>
    <div><h1>回遊元レポート</h1><p>各商品に何ページからバナーで誘導されているかを確認</p></div>
  </div>
  <div class="dropzone" id="dz">
    <div class="icon">📂</div>
    <div class="ttl">ファイルをタップ / ドロップ</div>
    <div class="sub">CSV（Shift-JIS）または xlsx に対応</div>
    <button class="btn-sel" onclick="document.getElementById('fi').click()">ファイルを選択</button>
    <input type="file" id="fi" accept=".csv,.xlsx,.xls" style="display:none">
  </div>
  <div class="loading" id="ld">⏳ 解析中...</div>
  <div class="err" id="er"></div>
  <div id="result" style="display:none">
    <div class="stats" id="stats"></div>
    <div class="sel-bar" id="selBar">
      <span class="sel-count" id="selCount">0件選択中</span>
      <button class="btn-sel-all" onclick="selectAll()">表示中を全選択</button>
      <button class="btn-sel-clear" onclick="clearSel()">選択解除</button>
      <button class="btn-del-sel" onclick="showDelModal()">🗑 選択商品のバナーを削除</button>
    </div>
    <div class="toolbar">
      <input type="text" id="searchBox" placeholder="🔍 商品番号・管理番号・商品名で検索">
      <div class="filters">
        <button class="active" onclick="setF('all',this)">全件</button>
        <button onclick="setF('100+',this)">100件以上</button>
        <button onclick="setF('10+',this)">10件以上</button>
        <button onclick="setF('1-9',this)">1〜9件</button>
        <button class="btn-reset" onclick="reset()">リセット</button>
      </div>
    </div>
    <div id="count"></div>
    <div id="list"></div>
  </div>
</div>

<div class="modal" id="delModal">
  <div class="modal-box">
    <div class="modal-title">🗑 バナー削除CSV出力</div>
    <div class="modal-desc" id="delDesc"></div>
    <div class="del-list" id="delList"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDelModal()">キャンセル</button>
      <button class="btn-confirm" onclick="dlDelCSV()">削除用CSVをダウンロード</button>
    </div>
  </div>
</div>

<script>
var data=[], cf='all', selectedIds={};
// 全商品データ（削除CSV用）
var allProds=[];

document.getElementById('fi').addEventListener('change',function(e){if(e.target.files[0])load(e.target.files[0]);e.target.value='';});
var dz=document.getElementById('dz');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag');});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);});

function load(file){
  var isX=/\.(xlsx|xls)$/i.test(file.name),isC=/\.csv$/i.test(file.name);
  if(!isX&&!isC){showErr('CSV または xlsx を選択してください');return;}
  showLd(true);
  var r=new FileReader();
  r.onload=function(e){
    try{
      var rows;
      if(isX){var wb=XLSX.read(e.target.result,{type:'array'});rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});}
      else{var buf=e.target.result,b=new Uint8Array(buf),txt;if(b[0]===0xEF&&b[1]===0xBB&&b[2]===0xBF){txt=new TextDecoder('utf-8').decode(buf.slice(3));}else{txt=new TextDecoder('shift-jis',{fatal:false}).decode(buf);if(!(txt.split('\n')[0]||'').includes('商品管理番号')){var u=new TextDecoder('utf-8',{fatal:false}).decode(buf);if((u.split('\n')[0]||'').includes('商品管理番号'))txt=u;}}rows=parseCSV(txt);}
      var res=processRows(rows);
      if(!res.inbound.length&&!res.prods.length)throw new Error('商品データが見つかりませんでした。説明文入りの全項目CSVを使用してください。');
      data=res.inbound; allProds=res.prods; render();
    }catch(ex){showErr(ex.message);}finally{showLd(false);}
  };
  r.onerror=function(){showErr('読み込みエラー');showLd(false);};
  r.readAsArrayBuffer(file);
}

function parseCSV(t){t=t.replace(/\r\n/g,'\n').replace(/\r/g,'\n');var rows=[],i=0,n=t.length;while(i<n){var row=[],ok=false;while(i<n&&t[i]!=='\n'){if(t[i]==='"'){i++;var c='';while(i<n){if(t[i]==='"'&&t[i+1]==='"'){c+='"';i+=2;}else if(t[i]==='"'){i++;break;}else c+=t[i++];}row.push(c.trim());if(c.trim())ok=true;if(t[i]===',')i++;}else{var c='';while(i<n&&t[i]!==','&&t[i]!=='\n')c+=t[i++];row.push(c.trim());if(c.trim())ok=true;if(t[i]===',')i++;}}if(t[i]==='\n')i++;if(ok)rows.push(row);}return rows;}

function getLinks(html){if(!html)return[];var p=/<a\s+href=["']([^"']+)["']/gi,m,out=[];while((m=p.exec(html))!==null)out.push(m[1].trim());return out;}
function getDstId(url){if(/\/c\/\d+/.test(url))return null;var m=url.match(/(?:item\.rakuten\.co\.jp|soko\.rms\.rakuten\.co\.jp)\/[^\/]+\/([^\/\?#\s]+)/);return m?m[1].replace(/\/$/,''):null;}

function processRows(rows){
  if(rows.length<2)return{inbound:[],prods:[]};
  var h=rows[0],idx=function(n){return h.findIndex(function(c){return String(c).trim()===n;});};
  var II=idx('商品管理番号（商品URL）'),IN=idx('商品番号'),IM=idx('商品名');
  var IP=idx('PC用商品説明文'),IS=idx('スマートフォン用商品説明文'),IV=idx('PC用販売説明文');
  if(II<0||IM<0)return{inbound:[],prods:[]};
  var idInfo={},prods=[],seen={};
  for(var r=1;r<rows.length;r++){
    var row=rows[r],iid=String(row[II]||'').trim(),nm=String(row[IM]||'').trim();
    if(!nm||seen[iid])continue;seen[iid]=true;
    var ino=String(row[IN]||'').trim();
    idInfo[iid]={no:ino,name:nm};
    var dsts=[],sd={};
    [String(row[IP]||''),String(row[IS]||''),String(row[IV]||'')].forEach(function(html){
      getLinks(html).forEach(function(url){var d=getDstId(url);if(d&&!sd[d]){sd[d]=true;dsts.push(d);}});
    });
    prods.push({id:iid,no:ino,name:nm,dsts:dsts,
      _pc:String(row[IP]||''),_sp:String(row[IS]||''),_sv:String(row[IV]||'')});
  }
  var inMap={};
  prods.forEach(function(p){p.dsts.forEach(function(d){
    if(!inMap[d])inMap[d]=[];
    if(!inMap[d].find(function(x){return x.srcId===p.id;}))
      inMap[d].push({srcId:p.id,srcNo:p.no,srcName:p.name});
  });});
  var inbound=Object.entries(inMap).filter(function(e){return e[1].length>0;})
    .sort(function(a,b){return b[1].length-a[1].length;})
    .map(function(e,i){var info=idInfo[e[0]];return{dstId:e[0],dstNo:info?info.no:'—',dstName:info?info.name:'CSV外の商品',srcs:e[1],idx:i};});
  return{inbound:inbound,prods:prods};
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function buildCard(item){
  var cnt=item.srcs.length,col=cnt>=100?'#e65100':cnt>=10?'#1565c0':'#2e7d32';
  var chkId='chk_'+esc(item.dstId);
  var rows=item.srcs.map(function(s,i){
    return'<tr><td class="idx">回遊元'+(i+1)+'</td><td class="no">'+esc(s.srcNo)+'</td><td class="id">'+esc(s.srcId)+'</td><td class="nm">'+esc(s.srcName.slice(0,30))+(s.srcName.length>30?'…':'')+'</td></tr>';
  }).join('');
  return'<div class="card" data-cnt="'+cnt+'" data-id="'+esc(item.dstId)+'" data-no="'+esc(item.dstNo)+'" data-text="'+esc((item.dstNo+' '+item.dstId+' '+item.dstName).toLowerCase())+'">'
    +'<div class="card-header" onclick="tog(this)">'
    +'<div class="chk-col"><input type="checkbox" id="'+chkId+'" onclick="event.stopPropagation()" onchange="onChk(this,\''+esc(item.dstId)+'\')"></div>'
    +'<div style="flex:1;min-width:0">'
    +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px">'
    +'<span class="item-no">'+esc(item.dstNo)+'</span>'
    +'<span class="cnt-label" style="color:'+col+'">'+cnt+'ページから回遊中</span>'
    +'</div>'
    +'<div class="item-name">'+esc(item.dstName.slice(0,50))+(item.dstName.length>50?'…':'')+'</div>'
    +'<div class="item-id-s">管理番号: '+esc(item.dstId)+'</div>'
    +'</div><span class="chev">▼</span></div>'
    +'<div class="card-body"><table>'
    +'<thead><tr><th></th><th>商品番号</th><th>管理番号</th><th>商品名</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div></div>';
}

function render(){
  var max=data.length?data[0].srcs.length:0,total=data.reduce(function(s,d){return s+d.srcs.length;},0);
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="stat-label">回遊先商品数</div><div class="stat-val" style="color:#1F3864">'+data.length.toLocaleString()+'</div></div>'
    +'<div class="stat"><div class="stat-label">最大回遊元数</div><div class="stat-val" style="color:#e65100">'+max.toLocaleString()+'</div></div>'
    +'<div class="stat"><div class="stat-label">バナー総数</div><div class="stat-val" style="color:#555">'+total.toLocaleString()+'</div></div>';
  document.getElementById('dz').style.display='none';
  document.getElementById('result').style.display='block';
  document.getElementById('ld').style.display='block';
  document.getElementById('ld').textContent='カード描画中...';
  setTimeout(function(){
    document.getElementById('list').innerHTML=data.map(buildCard).join('');
    document.getElementById('ld').style.display='none';
    applyF();
  },50);
}

function tog(h){h.parentElement.classList.toggle('open');}
function setF(f,btn){cf=f;document.querySelectorAll('.filters button').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');applyF();}
function applyF(){
  var q=document.getElementById('searchBox').value.toLowerCase().trim(),v=0;
  document.querySelectorAll('.card').forEach(function(el){
    var cnt=parseInt(el.dataset.cnt),mq=!q||el.dataset.text.includes(q),show=mq;
    if(cf==='100+')show=mq&&cnt>=100;if(cf==='10+')show=mq&&cnt>=10;if(cf==='1-9')show=mq&&cnt>=1&&cnt<=9;
    el.style.display=show?'':'none';if(show)v++;
  });
  document.getElementById('count').textContent=v.toLocaleString()+'件表示';
}

// 選択管理
function onChk(el,itemId){if(el.checked)selectedIds[itemId]=true;else delete selectedIds[itemId];updateSelBar();}
function updateSelBar(){
  var cnt=Object.keys(selectedIds).length;
  document.getElementById('selCount').textContent=cnt+'件選択中';
  var bar=document.getElementById('selBar');
  if(cnt>0)bar.classList.add('show');else bar.classList.remove('show');
}
function selectAll(){
  document.querySelectorAll('.card').forEach(function(el){
    if(el.style.display==='none')return;
    var chk=el.querySelector('input[type=checkbox]');
    if(chk){chk.checked=true;selectedIds[el.dataset.id]=true;}
  });
  updateSelBar();
}
function clearSel(){
  selectedIds={};
  document.querySelectorAll('input[type=checkbox]').forEach(function(c){c.checked=false;});
  updateSelBar();
}

// 削除モーダル
function showDelModal(){
  var selKeys=Object.keys(selectedIds);
  // 回遊先商品の管理番号から実際の商品を特定してバナー削除
  var targets=[];
  if(selKeys.length>0){
    selKeys.forEach(function(dstId){
      var p=allProds.find(function(x){return x.id===dstId;});
      if(p)targets.push(p);
    });
  } else {
    // 選択なし→全回遊先商品
    data.forEach(function(item){
      var p=allProds.find(function(x){return x.id===item.dstId;});
      if(p)targets.push(p);
    });
  }
  var mode=selKeys.length>0?'選択した商品（'+targets.length+'件）':'全回遊先商品（'+targets.length+'件）';
  document.getElementById('delDesc').innerHTML='<strong>対象：'+mode+'</strong><br><br>対象商品の<strong>PC用商品説明文・SP説明文・PC販売説明文のバナーを全て削除</strong>したCSVを出力します。<br><span style="color:#c62828;font-size:12px">※ RMSに取り込むと該当バナーが削除されます。取り込み前に必ず内容を確認してください。</span>';
  var listHtml='';
  targets.slice(0,100).forEach(function(p){listHtml+='<div class="del-item">'+esc(p.no)+' / '+esc(p.name.slice(0,30))+(p.name.length>30?'…':'')+'</div>';});
  if(targets.length>100)listHtml+='<div class="del-item" style="color:#888">…他'+(targets.length-100)+'件</div>';
  document.getElementById('delList').innerHTML=listHtml||'<div style="color:#888">対象商品がありません</div>';
  document.getElementById('delModal')._targets=targets;
  document.getElementById('delModal').classList.add('show');
}
function closeDelModal(){document.getElementById('delModal').classList.remove('show');}
function dlDelCSV(){
  var targets=document.getElementById('delModal')._targets||[];
  if(!targets.length){alert('対象商品がありません');return;}
  var rows=[['商品管理番号（商品URL）','商品番号','PC用商品説明文','スマートフォン用商品説明文','PC用販売説明文']];
  function removeBanners(html){if(!html)return'';return html.replace(/<a\s+href=["'][^"']*["'][^>]*>\s*<img\s[^>]*>\s*<\/a>/gi,'').replace(/^(\s*<br\s*\/?>\s*)+/i,'').trim();}
  targets.forEach(function(p){rows.push([p.id,p.no,removeBanners(p._pc),removeBanners(p._sp),removeBanners(p._sv)]);});
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));a.download='バナー削除用CSV_回遊元.csv';a.click();
  clearSel();closeDelModal();
}

function reset(){data=[];allProds=[];selectedIds={};updateSelBar();document.getElementById('dz').style.display='';document.getElementById('result').style.display='none';document.getElementById('searchBox').value='';cf='all';}
function showLd(on){document.getElementById('ld').style.display=on?'block':'none';document.getElementById('dz').style.display=on?'none':'';}
function showErr(msg){document.getElementById('er').textContent='⚠ '+msg;document.getElementById('er').style.display='block';showLd(false);}

document.getElementById('searchBox').addEventListener('input',applyF);
document.getElementById('delModal').addEventListener('click',function(e){if(e.target===this)closeDelModal();});
</script>
</body>
</html>
