<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ECツール集 | gojou95</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",Arial,sans-serif;background:#f0f2f7;min-height:100vh}
.wrap{max-width:640px;margin:0 auto;padding:20px 16px}

.header{background:#1F3864;border-radius:16px;padding:24px 20px;margin-bottom:24px;text-align:center;color:#fff}
.header .logo{font-size:36px;margin-bottom:8px}
.header h1{font-size:20px;font-weight:700;letter-spacing:.03em;margin-bottom:4px}
.header p{font-size:12px;opacity:.65}

.section-label{font-size:11px;font-weight:700;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;padding-left:4px}

.card-group{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}

.tool-card{background:#fff;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.07);overflow:hidden;text-decoration:none;display:flex;align-items:stretch;transition:transform .12s,box-shadow .12s}
.tool-card:active{transform:scale(.98);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.card-accent{width:6px;flex-shrink:0}
.card-body{padding:14px 16px;flex:1}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.card-icon{font-size:22px}
.card-title{font-size:15px;font-weight:700;color:#1F3864}
.card-badge{font-size:10px;font-weight:600;border-radius:4px;padding:2px 7px;white-space:nowrap}
.badge-std{background:#e8eaf6;color:#3949ab}
.badge-pv{background:#fff3e0;color:#e65100}
.card-desc{font-size:12px;color:#777;line-height:1.55}
.card-arrow{padding:0 14px;display:flex;align-items:center;color:#bbb;font-size:18px;flex-shrink:0}

.divider{height:1px;background:#e8eaed;margin:4px 0 20px}

.footer{text-align:center;font-size:11px;color:#bbb;padding:16px 0 8px}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo">🏪</div>
    <h1>ECツール集</h1>
    <p>楽天市場 店舗運営サポートツール</p>
  </div>

  <!-- 統合アプリ（おすすめ） -->
  <div class="section-label">ツール</div>
  <div class="card-group">
    <a class="tool-card" href="app.html" style="background:linear-gradient(135deg,#1F3864,#2d4f8f)">
      <div class="card-accent" style="background:#ffd54f"></div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-icon">🛍</span>
          <span class="card-title" style="color:#fff">楽天版 統合ツール</span>
        </div>
        <div class="card-desc" style="color:#dde3f0">楽天市場のRMS商品CSV用。バナー解析・回遊元・バナー一覧をタブで操作。</div>
      </div>
      <div class="card-arrow" style="color:#fff">›</div>
    </a>
    <a class="tool-card" href="app_yahoo.html" style="background:linear-gradient(135deg,#c0392b,#e74c3c)">
      <div class="card-accent" style="background:#ffd54f"></div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-icon">🅨</span>
          <span class="card-title" style="color:#fff">ヤフー版 統合ツール</span>
        </div>
        <div class="card-desc" style="color:#fde8e6">ヤフーショッピングの商品CSV用。同じ機能をヤフー仕様（訪問者数・6説明文列）で。</div>
      </div>
      <div class="card-arrow" style="color:#fff">›</div>
    </a>
  </div>
      <div class="card-arrow" style="color:#fff">›</div>
    </a>
  </div>

  <div class="footer">楽天市場 社内ツール</div>
</div>
</body>
</html>
